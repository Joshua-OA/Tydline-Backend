<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Tydline login link</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f7ff;font-family:'Inter',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f7ff;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background-color:#ffffff;border:1px solid rgba(5,38,152,0.12);">

          <!-- Header -->
          <tr>
            <td style="padding:24px 32px;border-bottom:1px solid rgba(5,38,152,0.12);">
              <img src="https://tydline.com/tydline-sqaurlogo.png"
                   width="48" height="48" alt="Tydline"
                   style="display:block;" />
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:36px 32px 28px;text-align:center;">

              <h1 style="margin:0 0 10px;font-size:20px;font-weight:800;color:#052698;letter-spacing:-0.3px;">
                Check your email
              </h1>
              <p style="margin:0 0 6px;font-size:14px;color:#000000;line-height:1.6;">
                We sent a secure login link to
              </p>
              <p style="margin:0 0 28px;font-size:14px;font-weight:600;color:#052698;line-height:1.6;">
                {{email}}
              </p>

              <!-- CTA Button -->
              <a href="{{magic_link}}"
                 style="display:inline-block;background-color:#052698;color:#ffffff;text-decoration:none;font-size:14px;font-weight:700;padding:12px 32px;letter-spacing:0.2px;">
                Continue to Tydline &rarr;
              </a>

              <p style="margin:24px 0 0;font-size:12px;color:#000000;opacity:0.5;line-height:1.6;">
                This link expires in 15 minutes and can only be used once.
              </p>
            </td>
          </tr>

          <!-- Spam notice -->
          <tr>
            <td style="padding:0 32px 32px;">
              <div style="border:1px solid rgba(5,38,152,0.12);background-color:#FCFDFF;padding:16px 20px;font-size:13px;color:#000000;line-height:1.6;text-align:left;">
                Didn't expect this email? You can safely ignore it. If you keep receiving it, contact us at
                <a href="mailto:hello@tydline.com" style="color:#052698;text-decoration:underline;">hello@tydline.com</a>.
              </div>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:16px 32px;border-top:1px solid rgba(5,38,152,0.12);text-align:center;">
              <p style="margin:0;font-size:12px;color:#000000;opacity:0.45;">
                &copy; 2026 Tydline. All rights reserved.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
